<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrazione Studente</title>
  <style>
    body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif; padding:20px}
    label{display:block;margin-top:12px}
    input[type=text], input[type=date], input[type=number], select{padding:6px; width:320px; max-width:100%}
    .invalid{border:2px solid #d9534f}
    .note{font-size:0.9em;color:#666}
    #errors{margin-top:12px;color:#d9534f}
    pre{white-space:pre-wrap; word-wrap:break-word}
    .small{font-size:0.9em}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    button{margin-top:12px;padding:8px 12px}
  </style>
</head>
<body>
  <h1>Modulo registrazione</h1>
  <form id="regForm" novalidate>
    <label for="nome">Nome *</label>
    <input id="nome" name="nome" type="text" required>

    <label for="cognome">Cognome *</label>
    <input id="cognome" name="cognome" type="text" required>

    <label for="dob">Data di nascita *</label>
    <input id="dob" name="dob" type="date" required>

    <label for="cf">Codice fiscale * <span class="note">(16 caratteri alfanumerici)</span></label>
    <input id="cf" name="codiceFiscale" type="text" maxlength="16" required>

    <label for="classe">Classe (selezione multipla) *</label>
    <select id="classe" name="classi" multiple size="5" required>
      <option value="I">I</option>
      <option value="II">II</option>
      <option value="III">III</option>
      <option value="IV">IV</option>
      <option value="V">V</option>
    </select>

    <label for="sezione">Sezione (selezione multipla) *</label>
    <select id="sezione" name="sezioni" multiple size="4" required>
      <option value="A">A</option>
      <option value="B">B</option>
      <option value="C">C</option>
      <option value="D">D</option>
    </select>

    <div class="row">
      <label for="ripetente">Ripetente</label>
      <input id="ripetente" name="ripetente" type="checkbox">
      <label for="anniRipetuti" class="small">Anni ripetuti</label>
      <input id="anniRipetuti" name="anniRipetuti" type="number" min="1" style="width:90px" disabled>
    </div>

    <label for="uscita">Uscita prevista (selezione multipla) *</label>
    <select id="uscita" name="uscita" multiple size="3" required>
      <option value="lavoro">Lavoro</option>
      <option value="universita">Università</option>
      <option value="altro">Altro</option>
    </select>

n    <button type="submit">Invia</button>
    <div id="errors" aria-live="polite"></div>
  </form>

n  <script>
    (function(){
      const form = document.getElementById('regForm');
      const ripetente = document.getElementById('ripetente');
      const anni = document.getElementById('anniRipetuti');
      const errorsDiv = document.getElementById('errors');

      ripetente.addEventListener('change', ()=>{
        anni.disabled = !ripetente.checked;
        if(!ripetente.checked){ anni.value = ''; anni.classList.remove('invalid'); }
      });

      function clearValidation(){
        errorsDiv.innerHTML = '';
        Array.from(form.elements).forEach(el=> el.classList && el.classList.remove('invalid'));
      }

      function getSelectedValues(select){
        return Array.from(select.selectedOptions).map(o=>o.value);
      }

      function validate(){
        clearValidation();
        const errs = [];
        const nome = document.getElementById('nome');
        const cognome = document.getElementById('cognome');
        const dob = document.getElementById('dob');
        const cf = document.getElementById('cf');
        const classe = document.getElementById('classe');
        const sezione = document.getElementById('sezione');
        const uscita = document.getElementById('uscita');

        if(!nome.value.trim()) errs.push({field:nome, msg:'Nome obbligatorio'});
        if(!cognome.value.trim()) errs.push({field:cognome, msg:'Cognome obbligatorio'});
        if(!dob.value) errs.push({field:dob, msg:'Data di nascita obbligatoria'});

        const cfVal = cf.value.trim().toUpperCase();
        const cfPattern = /^[A-Z0-9]{16}$/i;
        if(!cfVal) errs.push({field:cf, msg:'Codice fiscale obbligatorio'});
        else if(!cfPattern.test(cfVal)) errs.push({field:cf, msg:'Codice fiscale deve essere di 16 caratteri alfanumerici'});
        else cf.value = cfVal;

        const classiSel = getSelectedValues(classe);
        if(classiSel.length === 0) errs.push({field:classe, msg:'Selezionare almeno una classe'});

        const sezSel = getSelectedValues(sezione);
        if(sezSel.length === 0) errs.push({field:sezione, msg:'Selezionare almeno una sezione'});

        if(ripetente.checked){
          const anniVal = anni.value;
          if(!anniVal) errs.push({field:anni, msg:'Inserire il numero di anni ripetuti'});
          else if(Number(anniVal) < 1) errs.push({field:anni, msg:'Gli anni ripetuti devono essere >= 1'});
        }

        const uscSel = getSelectedValues(uscita);
        if(uscSel.length === 0) errs.push({field:uscita, msg:'Selezionare almeno una destinazione di uscita'});

        return errs;
      }

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        const errs = validate();
        if(errs.length){
          errs.forEach(({field,msg})=>{ if(field && field.classList) field.classList.add('invalid'); });
          errorsDiv.innerHTML = errs.map((er,i)=> `<div><strong>${i+1}.</strong> ${er.msg}</div>`).join('');
          if(errs[0] && errs[0].field) errs[0].field.focus();
          return;
        }

        const payload = {
          nome: document.getElementById('nome').value.trim(),
          cognome: document.getElementById('cognome').value.trim(),
          dataDiNascita: document.getElementById('dob').value,
          codiceFiscale: document.getElementById('cf').value.trim().toUpperCase(),
          classi: Array.from(document.getElementById('classe').selectedOptions).map(o=>o.value),
          sezioni: Array.from(document.getElementById('sezione').selectedOptions).map(o=>o.value),
          ripetente: document.getElementById('ripetente').checked,
          anniRipetuti: document.getElementById('anniRipetuti').value ? Number(document.getElementById('anniRipetuti').value) : 0,
          uscita: Array.from(document.getElementById('uscita').selectedOptions).map(o=>o.value)
        };

        try{
          const resp = await fetch('/submit', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
          if(resp.status === 400){
            const body = await resp.json();
            const errors = body.errors || [];
            errors.forEach(er=>{
              const el = document.querySelector(`[name="${er.field}"]` ) || document.getElementById(er.field);
              if(el && el.classList) el.classList.add('invalid');
            });
            errorsDiv.innerHTML = errors.map((er,i)=> `<div><strong>${i+1}.</strong> ${er.msg}</div>`).join('');
            return;
          }
          const json = await resp.json();
          const encoded = encodeURIComponent(JSON.stringify(json.data));
          // redirect to server-rendered result
          window.location.href = '/result?data=' + encoded;
        }catch(err){
          errorsDiv.textContent = 'Errore di rete o server: ' + err.message;
        }
      });
    })();
  </script>
</body>
</html>
